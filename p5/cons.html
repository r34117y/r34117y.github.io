<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <script src="https://github.com/processing/p5.js/releases/download/1.0.0/p5.min.js"></script>
    <title>r34117y - mosaic1</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
<script>
    let arr = [];
    let gridSize = 15;
    let cellWidth;
    let cellHeight;

    function updateGridMetrics() {
        cellWidth = width / gridSize;
        cellHeight = height / gridSize;
    }

    function setup() {
        createCanvas(windowWidth, windowHeight);
        updateGridMetrics();

        for(let i =0; i < gridSize ** 2; i++){
            arr.push([random(cellWidth), random(cellHeight)]);
        }

    }

    function draw() {
        background(220);
        textAlign(CENTER, CENTER);


        for (let y = 0; y < gridSize; y++) {
            for (let x = 0; x < gridSize; x++) {
                let xpos = x * cellWidth;
                let ypos = y * cellHeight;
                let index = y * gridSize + x; // find the index
                strokeWeight(1)
                drawLine(xpos, ypos, arr[index][0], arr[index][1])
            }
        }

        colorMode(RGB);

    }

    function drawLine(xpos, ypos, dx, dy) {
        dx = (dx + frameCount) % cellWidth;
        dy = (dy + frameCount) % cellHeight;

        // górny lewy
        fill(random(255), random(255), 255)
        rect(xpos, ypos, dx, dy)
        // górny prawy
        fill(random(255), 255, random(255))
        rect(xpos + dx, ypos, cellWidth - dx, dy)
        // dolny lewy
        fill(255, random(255), random(255))
        rect(xpos, ypos + dy, dx, cellHeight - dy)
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        updateGridMetrics();
    }
</script>
</body>
</html>
